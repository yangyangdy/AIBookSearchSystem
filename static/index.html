<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>书籍封面 · 以图搜图</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #fff;
      --text: #1a1d26;
      --muted: #5c6370;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e2e6ed;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 8px;
    }
    .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .sub a { color: var(--accent); }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="number"],
    input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .row {
      display: grid;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (min-width: 640px) {
      .row.cols-2 { grid-template-columns: 1fr 1fr; }
      .row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    }
    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      margin: 0;
    }
    .check-row input {
      margin-top: 4px;
      flex-shrink: 0;
    }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .preview-wrap {
      margin-top: 12px;
      display: none;
    }
    .preview-wrap.show { display: block; }
    .preview-wrap img {
      max-height: 160px;
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary:hover:not(:disabled) { background: var(--accent-hover); }
    button.primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.err { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .msg.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .msg.ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .results-head {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
    .card-img {
      aspect-ratio: 3/4;
      background: #eef1f6;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .card-body { padding: 12px; font-size: 0.85rem; }
    .sim {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .card-body div { margin-bottom: 4px; word-break: break-all; }
    .card-body .k { color: var(--muted); }
    .ocr-block {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .ocr-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .ocr {
      font-size: 0.78rem;
      color: var(--muted);
      max-height: 4.5em;
      overflow: hidden;
      position: relative;
    }
    .ocr.expanded { max-height: none; }
    .ocr-toggle {
      margin-top: 4px;
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      font-size: 0.78rem;
    }
    .loading {
      display: none;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .loading.show { display: flex; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>书籍封面 · 以图搜图</h1>
    <p class="sub">填写图片链接或上传本地图片，查询向量库中最相似的封面。API 文档见 <a href="/docs">/docs</a></p>

    <div class="panel">
      <div class="row">
        <div>
          <label for="imageUrl">图片 URL（http/https）</label>
          <input type="url" id="imageUrl" placeholder="https://example.com/cover.jpg" autocomplete="off" />
          <p class="hint">若同时填写 URL 与上传文件，将优先使用 URL。</p>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="file">或上传本地图片</label>
          <input type="file" id="file" accept="image/*" />
          <div class="preview-wrap" id="previewWrap">
            <img id="preview" alt="预览" />
          </div>
        </div>
      </div>
      <div class="row cols-2">
        <div>
          <label for="topK">返回条数 top_k</label>
          <input type="number" id="topK" min="1" max="100" value="10" />
        </div>
        <div>
          <label for="threshold1">相似度高阈值 threshold1（≥ 即视为一致）</label>
          <input type="number" id="threshold1" min="0" max="1" step="0.05" value="0.85" />
        </div>
        <div>
          <label for="threshold2">相似度低阈值 threshold2（无高阈值时取最高分做 OCR 比对）</label>
          <input type="number" id="threshold2" min="0" max="1" step="0.05" value="0.6" />
        </div>
      </div>
      <div class="row">
        <label class="check-row">
          <input type="checkbox" id="ocrRefine" />
          <span>启用 OCR 二次比对（无高阈值命中时，对「分数最高的低阈值候选」做查询图 OCR 与 ocr_text 比对）</span>
        </label>
      </div>
      <div class="actions">
        <button type="button" class="primary" id="btnSearch">查询</button>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>正在检索…</span>
        </div>
      </div>
    </div>

    <div class="msg" id="msg"></div>
    <div id="resultsSection" style="display:none;">
      <div class="results-head" id="resultsHead"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const msgEl = $("msg");
    const grid = $("grid");
    const resultsSection = $("resultsSection");
    const resultsHead = $("resultsHead");
    const fileInput = $("file");
    const previewWrap = $("previewWrap");
    const preview = $("preview");
    const ocrRefine = $("ocrRefine");

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = "msg show " + (type || "info");
    }
    function hideMsg() {
      msgEl.className = "msg";
      msgEl.textContent = "";
    }

    fileInput.addEventListener("change", () => {
      const f = fileInput.files[0];
      if (!f) {
        previewWrap.classList.remove("show");
        return;
      }
      const r = new FileReader();
      r.onload = () => {
        preview.src = r.result;
        previewWrap.classList.add("show");
      };
      r.readAsDataURL(f);
    });

    function readFileB64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    $("btnSearch").addEventListener("click", async () => {
      hideMsg();
      grid.innerHTML = "";
      resultsSection.style.display = "none";

      const url = $("imageUrl").value.trim();
      const file = fileInput.files[0];
      let topK = parseInt($("topK").value, 10);
      let threshold1 = parseFloat($("threshold1").value);
      let threshold2 = parseFloat($("threshold2").value);
      if (isNaN(topK) || topK < 1) topK = 10;
      if (topK > 100) topK = 100;
      if (isNaN(threshold1)) threshold1 = 0.85;
      if (isNaN(threshold2)) threshold2 = 0.6;
      threshold1 = Math.min(1, Math.max(0, threshold1));
      threshold2 = Math.min(1, Math.max(0, threshold2));
      if (threshold1 <= threshold2) {
        showMsg("相似度高阈值 threshold1 必须大于低阈值 threshold2。", "err");
        return;
      }

      const body = {
        top_k: topK,
        similarity_threshold1: threshold1,
        similarity_threshold2: threshold2,
        use_ocr_text_refinement: ocrRefine.checked,
      };

      if (url) {
        body.image_url = url;
      } else if (file) {
        body.image_base64 = await readFileB64(file);
      } else {
        showMsg("请填写图片 URL 或上传一张本地图片。", "err");
        return;
      }

      const btn = $("btnSearch");
      const loading = $("loading");
      btn.disabled = true;
      loading.classList.add("show");

      try {
        const res = await fetch("/api/v1/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const detail = data.detail;
          const errText =
            typeof detail === "string"
              ? detail
              : Array.isArray(detail)
                ? detail.map((d) => d.msg || d).join("; ")
                : res.statusText;
          showMsg("请求失败: " + (errText || res.status), "err");
          return;
        }

        if (!data.success) {
          showMsg(data.message || "搜索未成功", "err");
          return;
        }

        const results = data.results || [];
        if (results.length === 0) {
          let noResultMsg = data.message || "没有符合阈值的结果，可尝试降低相似度阈值。";
          if (data.refinement_detail) noResultMsg += " " + data.refinement_detail;
          showMsg(noResultMsg, "info");
          return;
        }

        let okTip = data.message + "，共 " + data.total + " 条。";
        if (data.refinement_detail) okTip += " " + data.refinement_detail;
        showMsg(okTip, "ok");
        resultsHead.textContent = "检索结果（" + data.total + " 条）";
        resultsSection.style.display = "block";

        results.forEach((item, idx) => {
          const card = document.createElement("article");
          card.className = "card";
          const sim = (item.similarity != null ? Number(item.similarity) : 0).toFixed(4);
          const ocrFull = item.ocr_text || "";
          const ocrShortPlain =
            ocrFull.length > 120 ? ocrFull.slice(0, 120) + "…" : ocrFull;
          const needExpand = ocrFull.length > 120;

          card.innerHTML =
            '<div class="card-img"><img loading="lazy" alt="" src="' +
            escapeAttr(item.cover_link || "") +
            '" /></div>' +
            '<div class="card-body">' +
            '<div class="sim">相似度 ' +
            sim +
            "</div>" +
            '<div><span class="k">SKU</span> ' +
            escapeHtml(item.sku || "") +
            "</div>" +
            '<div><span class="k">ISBN</span> ' +
            escapeHtml(item.isbn || "") +
            "</div>" +
            '<div><span class="k">作者</span> ' +
            escapeHtml(item.author || "—") +
            "</div>" +
            (item.ocr_match_score != null
              ? '<div><span class="k">OCR比对分</span> ' +
                Number(item.ocr_match_score).toFixed(4) +
                "</div>"
              : "") +
            (ocrFull
              ? '<div class="ocr-block">' +
                '<div class="ocr-label">OCR 提取</div>' +
                '<div class="ocr" data-ocr="' +
                idx +
                '">' +
                escapeHtml(needExpand ? ocrShortPlain : ocrFull) +
                "</div>" +
                (needExpand
                  ? '<button type="button" class="ocr-toggle">展开全文</button>'
                  : "") +
                "</div>"
              : "") +
            "</div>";

          grid.appendChild(card);

          if (needExpand) {
            const ocrEl = card.querySelector("[data-ocr]");
            const btnOcr = card.querySelector(".ocr-toggle");
            btnOcr.addEventListener("click", () => {
              if (ocrEl.classList.contains("expanded")) {
                ocrEl.textContent = ocrShortPlain;
                ocrEl.classList.remove("expanded");
                btnOcr.textContent = "展开全文";
              } else {
                ocrEl.textContent = ocrFull;
                ocrEl.classList.add("expanded");
                btnOcr.textContent = "收起";
              }
            });
          }
        });
      } catch (e) {
        showMsg("网络或解析错误: " + (e.message || String(e)), "err");
      } finally {
        btn.disabled = false;
        loading.classList.remove("show");
      }
    });

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
    function escapeAttr(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;");
    }
  </script>
</body>
</html>
